# Codex CLI MCP server config
# This block gets appended to ~/.codex/config.toml (or .codex/config.toml in a trusted project).
# Codex resolves ${VAR} placeholders against your shell environment, so source .env first
# (install.sh does this automatically when it generates the rendered config).

[mcp_servers.github]
command = "${REPO_ROOT}/bin/github-mcp-server"
args = ["stdio"]
env = { GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_PERSONAL_ACCESS_TOKEN}" }
startup_timeout_sec = 30
tool_timeout_sec = 60
enabled = true

[mcp_servers.atlassian]
command = "uvx"
args = ["mcp-atlassian"]
env = {
  JIRA_URL = "${JIRA_URL}",
  JIRA_USERNAME = "${JIRA_USERNAME}",
  JIRA_API_TOKEN = "${JIRA_API_TOKEN}",
  CONFLUENCE_URL = "${CONFLUENCE_URL}",
  CONFLUENCE_USERNAME = "${CONFLUENCE_USERNAME}",
  CONFLUENCE_API_TOKEN = "${CONFLUENCE_API_TOKEN}",
}
startup_timeout_sec = 30
tool_timeout_sec = 60
enabled = true
